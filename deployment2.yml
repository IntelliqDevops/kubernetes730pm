---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    cat: db
    author: intelliqit
spec:
  replicas: 2
  selector:
    matchLabels:
      rat: dog
  template:
    metadata:
      name: mysql-pod
      labels:
        rat: dog
    spec:
      containers:
        - name: mydb
          image: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: intelliqit
...




